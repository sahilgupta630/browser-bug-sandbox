<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Browser Bug Sandbox Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease-out;
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 60%);
            transform: rotate(30deg);
        }

        h3 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #b0c4de;
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .bug-link {
            display: block;
            text-decoration: none;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: 600;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .bug-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .bug-link:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
            border-color: transparent;
        }

        .bug-link:hover::before {
            opacity: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bug-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <h3>Bug Sandbox</h3>
        <p class="subtitle">A stunning test environment for your browser bugs. Pick a test case below to inspect
            behavior.</p>

        <div class="links-grid">
            <a href="/bugs/1284488" class="bug-link">
                <span class="bug-icon">🐛</span>
                Bug 1284488
            </a>
            <a href="/bugs/1441079" class="bug-link">
                <span class="bug-icon">🐛</span>
                Bug 1441079
            </a>
            <a href="/bugs/1542172" class="bug-link">
                <span class="bug-icon">🐛</span>
                Bug 1542172
            </a>
            <a href="/bugs/quotedtext" class="bug-link">
                <span class="bug-icon">📝</span>
                Quoted Text
            </a>
            <a href="/bugs/websocket" class="bug-link">
                <span class="bug-icon">🔌</span>
                WebSocket
            </a>
            <a href="/htmlresp" class="bug-link">
                <span class="bug-icon">📄</span>
                HTML Resp
            </a>
            <a href="/plain.txt" class="bug-link">
                <span class="bug-icon">📝</span>
                Plain TXT
            </a>
        </div>
    </div>

    <!-- Retaining original diagnostic logs -->
    <script>
        console.log("google.com");
        console.log("facebook");
        console.log("5555555555555");
        let b = 77776456;
        console.log(b);
        console.log("911-100-8181");
    </script>
</body>

</html>
